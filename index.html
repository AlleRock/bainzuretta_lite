<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bainzuretta Lite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fb8c00">

    <style>
        :root { --primary:#fb8c00; --bg:#f0f2f5; --card:#fff; --text:#111; --border:#888; }
        @media (prefers-color-scheme: dark){:root{--bg:#000;--card:#1c1c1e;--text:#fff;--border:#444;}}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Outfit;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        header{background:var(--primary);color:#fff;text-align:center;font-family:Lobster;font-size:2.4em;padding:10px}
        .page{flex:1;display:none;flex-direction:column}
        .page.active{display:flex}
        .scroll{flex:1;overflow:auto;padding:10px}
        .card{background:var(--card);padding:12px;border-radius:15px;margin-bottom:10px}
        button{padding:10px;border:none;border-radius:10px;background:#FC4C02;color:#fff;font-weight:700}
    </style>
</head>

<body>

<header>Bainzuretta Lite</header>

<div class="page active" id="diario">
    <div class="scroll" id="lista"></div>
</div>

<script>
const K_RAW = 'bainzuretta_lite_raw';

let data = JSON.parse(localStorage.getItem(K_RAW) || "[]");

// ==========================
// UTILS
// ==========================
function save(){ localStorage.setItem(K_RAW, JSON.stringify(data)); }

async function fetchWithRetry(url, token, retries = 3){
    for(let i=0;i<retries;i++){
        try{
            const r = await fetch(url, {
                headers:{Authorization:`Bearer ${token}`}
            });
            if(r.ok) return r;
        }catch(e){}
        await new Promise(res=>setTimeout(res, 500));
    }
    return null;
}

async function fetchConLimite(tasks, limit=5){
    const res=[];
    let i=0;
    async function worker(){
        while(i<tasks.length){
            const c=i++;
            res[c]=await tasks[c]();
        }
    }
    await Promise.all(Array.from({length:limit},worker));
    return res;
}

// ==========================
// TOKEN MOCK (tu già lo hai altrove)
// ==========================
async function getToken(){
    const t = localStorage.getItem("bainzuretta_strava");
    return t ? JSON.parse(t).access_token : null;
}

// ==========================
// SYNC FIXATA (QUI IL CUORE)
// ==========================
async function sync(){
    const token = await getToken();
    if(!token) return;

    let page = 1;
    let all = [];

    // ======================
    // PAGINAZIONE ROBUSTA
    // ======================
    while(true){

        const url = `https://www.strava.com/api/v3/athlete/activities?per_page=100&page=${page}`;

        const r = await fetchWithRetry(url, token);

        if(!r){
            console.warn("Pagina fallita, skip");
            page++;
            continue;
        }

        const j = await r.json().catch(()=>[]);

        if(!j.length){
            break;
        }

        all.push(...j);

        if(j.length < 100){
            break;
        }

        page++;
    }

    if(!all.length){
        return;
    }

    // ======================
    // FETCH DETTAGLI PARALLELO
    // ======================
    const tasks = all.map(a => async () => {

        let desc = '';

        const r = await fetchWithRetry(
            `https://www.strava.com/api/v3/activities/${a.id}`,
            token
        );

        if(r){
            const d = await r.json().catch(()=>null);
            desc = d?.description || '';
        }

        return {
            id:a.id,
            name:a.name,
            date:a.start_date_local,
            km:(a.distance/1000).toFixed(2),
            desc
        };
    });

    const res = await fetchConLimite(tasks, 5);

    data = [...data, ...res];
    save();
    render();
}

// ==========================
// RENDER
// ==========================
function render(){
    document.getElementById("lista").innerHTML =
        data
        .sort((a,b)=>new Date(b.date)-new Date(a.date))
        .map(a=>`
            <div class="card">
                <b>${a.name}</b><br>
                ${a.km} km<br>
                <small>${a.desc || ""}</small>
            </div>
        `).join("");
}

// ==========================
// INIT
// ==========================
window.onload = ()=>{
    render();
};
</script>

</body>
</html>
